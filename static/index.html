<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>What the tile?</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v0.49.0/mapbox-gl.css' rel='stylesheet' />
    <link rel='stylesheet' href='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v2.3.0/mapbox-gl-geocoder.css' type='text/css' />

    <style>
        body { margin:0; padding:0; font-family: sans-serif; }
        #header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background-color: #2c3e50;
            z-index: 10;
            position: relative;
        }
        #header-title {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            margin-right: 4px;
        }
        #tilesearch {
            display: flex;
            align-items: center;
            height: 36px;
            background-color: #fff;
            border-radius: 4px;
            border: none;
            overflow: hidden;
            flex-shrink: 0;
        }
        #tilesearch #tag {
            color: #7f8c8d;
            font-weight: bold;
            font-size: 13px;
            padding: 0 8px;
            background: #ecf0f1;
            height: 100%;
            display: flex;
            align-items: center;
            border-right: 1px solid #ddd;
        }
        #tilesearch #editable {
            font-size: 14px;
            border: none;
            outline: none;
            padding: 0 10px;
            height: 100%;
            width: 160px;
        }
        #geocoder-container .mapboxgl-ctrl-geocoder {
            min-width: 240px;
            width: 100%;
            max-width: 360px;
            box-shadow: none;
            border-radius: 4px;
            font-size: 14px;
        }
        #map { position:absolute; top:52px; bottom:0; width:100%; }

        #snackbar {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            left: 50%;
            bottom: 30px;
            z-index: 20;
        }

        #snackbar.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.3s 1.7s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>

<body>
<div id='header'>
    <div id='header-title'>What the tile?</div>
    <form id='tilesearch' onsubmit="return false;">
        <div id='tag'>QK</div>
        <input id='editable' placeholder='Enter quadkey...' />
    </form>
    <div id='geocoder-container'></div>
</div>
<div id='map'></div>
<div id='snackbar'>Copied quadkey to clipboard.</div>
</body>
<script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>
<script src='./bundle.js'></script>
</html>
